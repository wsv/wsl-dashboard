[about]
title = "Software Introduction"
description = "WSL Dashboard is an open-source visual management tool for Windows Subsystem for Linux (WSL). It provides users with an intuitive graphical interface for efficiently managing Linux distros, supporting core functions such as one-click start, stop, restart, cloning, and exporting backups. It also includes a built-in distro store, making WSL management and usage simpler and more convenient."
