[about]
title = "软件简介"
description = "WSL Dashboard 是一款针对 Windows Subsystem for Linux (WSL) 的开源视觉管理工具。它为用户提供了直观的图形界面，用于高效管理 Linux 发行版，支持一键启动、停止、重启、克隆和导出备份等核心功能。它还内置了发行版商店，使 WSL 的管理和使用更加简单方便。"
